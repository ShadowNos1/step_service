<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Обучение ЗАПЕЧЬ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap');
        
        :root {
            --sat: env(safe-area-inset-top);
            --sar: env(safe-area-inset-right);
            --sab: env(safe-area-inset-bottom);
            --sal: env(safe-area-inset-left);
        }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
            padding-top: var(--sat);
            min-height: 100vh;
        }

        .ios-card {
            background: white;
            border-radius: 24px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 4px 20px -5px rgba(0,0,0,0.05);
        }

        .ios-tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(65px + var(--sab));
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border-top: 0.5px solid rgba(0,0,0,0.1);
            padding-bottom: var(--sab);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .safe-area-spacer {
            height: calc(85px + var(--sab));
        }

        .step-node {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .step-node.active {
            transform: scale(1.1);
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .step-node.completed {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .progress-line {
            background: linear-gradient(to right, #ef4444 var(--progress, 0%), #e2e8f0 var(--progress, 0%));
            transition: --progress 0.5s ease;
        }

        .quiz-option {
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .quiz-option:hover {
            transform: translateX(4px);
        }

        .quiz-option.selected {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        .quiz-option.correct {
            border-color: #22c55e;
            background-color: #f0fdf4;
        }

        .quiz-option.wrong {
            border-color: #ef4444;
            background-color: #fef2f2;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .slide-up {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        * { -webkit-user-select: none; user-select: none; }
        input { -webkit-user-select: text; user-select: text; }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #ef4444;
            animation: confetti-fall 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes confetti-fall {
            0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .score-circle {
            background: conic-gradient(#ef4444 calc(var(--score) * 1%), #e2e8f0 0);
            border-radius: 50%;
            transition: --score 1s ease-out;
        }

        /* Splash screen styles */
        .splash-screen {
            position: fixed;
            inset: 0;
            background: #fafafa;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: var(--sat) 20px 20px;
            
        }

        .splash-ornament {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 40%;
            max-width: 200px;
            background-image: url('hello_page.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .splash-content {
            position: relative;
            z-index: 10;
            text-align: left;
            width: 100%;
        }

        .splash-title {
            font-size: clamp(2rem, 10vw, 4rem);
            font-weight: 800;
            color: #dc2626;
            line-height: 1.1;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        .splash-button {
            background: #dc2626;
            color: white;
            padding: 1.25rem 3rem;
            border-radius: 9999px;
            font-weight: 800;
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 40px -10px rgba(220, 38, 38, 0.5);
            transition: all 0.3s ease;
        }

        .splash-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 50px -10px rgba(220, 38, 38, 0.6);
        }

        .splash-button:active {
            transform: scale(0.95);
        }

        /* Header with ornament */
        .header-ornament {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background-size: auto 100%;
            background-repeat: repeat-x;
            background-position: center;
        }
        .header-text{
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            margin: 0 -20px;
            padding: 6px 2px;
        }
        header{
            background-image: url('background_header.jpg');
            
        }
    </style>
</head>
<body class="text-slate-900">

                        Начать финальный тест
                    </button>
                </div>
            </div>
        </div>

        <!-- Learning View -->
        <div id="learningView" class="hidden">
            <button onclick="app.backToRoadmap()" class="mb-4 flex items-center gap-2 text-sm font-bold text-slate-500 active:scale-95 transition-transform">
                <i class="fa fa-chevron-left"></i> Назад к дорожке
            </button>

            <div id="stepContent" class="ios-card p-5 mb-4">
                <!-- Content injected by JS -->
            </div>
        </div>

        <!-- Final Test View -->
        <div id="testView" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <button onclick="app.backToRoadmap()" class="flex items-center gap-2 text-sm font-bold text-slate-500 active:scale-95 transition-transform">
                    <i class="fa fa-chevron-left"></i> Выйти
                </button>
                <span class="text-[10px] font-black text-slate-400 uppercase">Финальный тест</span>
            </div>

            <div id="testContent" class="space-y-3">
                <!-- Test injected by JS -->
            </div>
        </div>

        <!-- Results View -->
        <div id="resultsView" class="hidden text-center py-8">
            <div class="relative w-32 h-32 mx-auto mb-6">
                <div class="absolute inset-0 score-circle rounded-full" id="scoreCircle" style="--score: 0"></div>
                <div class="absolute inset-2 bg-white rounded-full flex items-center justify-center">
                    <div>
                        <div class="text-3xl font-black text-red-600" id="finalScore">0</div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase">%</div>
                    </div>
                </div>
            </div>

            <h2 class="text-2xl font-black text-slate-800 mb-2" id="resultTitle">Отлично!</h2>
            <p class="text-sm text-slate-500 mb-6 px-4" id="resultMessage">Ты усвоил материал отлично</p>

            <div class="ios-card p-4 mb-4 text-left">
                <h3 class="font-black text-sm uppercase text-slate-400 mb-3">Результаты:</h3>
                <div id="testStats" class="space-y-2 text-sm">
                    <!-- Stats injected by JS -->
                </div>
            </div>

            <button onclick="app.restartTest()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-sm tracking-wider active:scale-95 transition-all mb-3">
                Пройти тест заново
            </button>
            <button onclick="app.restartAll()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase text-sm tracking-wider active:scale-95 transition-all">
                Вернуться к началу
            </button>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="ios-tab-bar" id="bottomNav">
        <button onclick="app.showRoadmap()" class="flex flex-col items-center gap-1 transition-all active:scale-90 text-red-600" id="navRoadmap">

            </div>

            {
                question: "Что такое пересервирование стола?",
                options: ["Уборка стола после гостей", "Подготовка стола для следующих гостей", "Бронирование на завтра", "Установка резерва"],
                correct: 1,
                step: 6
            }
        ];

        class TrainingApp {
            constructor() {
                this.currentStep = 0;
                this.completedSteps = new Array(6).fill(false);
                this.testResults = null;
                this.shuffledQuestions = [];
                this.currentQuestion = 0;
                this.correctAnswers = 0;
                
                this.init();
            }

            init() {
                this.renderRoadmap();
                this.updateProgress();
            }

            startLearning() {
                document.getElementById('splashScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splashScreen').classList.add('hidden');
                }, 300);
            }

            renderRoadmap() {
                const container = document.getElementById('stepsContainer');
                container.innerHTML = '';

                trainingData.forEach((step, index) => {
                    const isCompleted = this.completedSteps[index];
                    const isActive = index === this.getNextStep();

                    const div = document.createElement('div');
                    div.className = `flex items-center gap-4 p-4 ios-card cursor-pointer active:scale-95 transition-transform ${isActive ? 'ring-2 ring-red-500' : ''}`;
                    div.onclick = () => this.openStep(index);

                    div.innerHTML = `
                        <div class="relative">
                            <div class="w-12 h-12 rounded-full ${isCompleted ? 'bg-red-600 text-white' : isActive ? 'bg-red-100 text-red-600' : 'bg-slate-100 text-slate-400'} flex items-center justify-center text-xl font-black transition-all ${isActive ? 'step-node active' : ''}">
                                ${isCompleted ? '<i class="fa fa-check"></i>' : `<i class="fa ${step.icon}"></i>`}
                            </div>
                            ${isActive ? '<div class="pulse-ring w-12 h-12 absolute inset-0"></div>' : ''}
                        </div>
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] font-black text-slate-400 uppercase">Шаг ${step.id}</span>
                                ${isCompleted ? '<span class="text-[10px] font-black text-red-600 bg-red-50 px-2 py-0.5 rounded-full">Изучено</span>' : ''}
                            </div>
                            <h3 class="font-extrabold text-slate-800 leading-tight ${isCompleted ? 'text-slate-500' : ''}">${step.title}</h3>
                        </div>
                        <i class="fa fa-chevron-right text-slate-300 ${isCompleted ? 'text-red-300' : ''}"></i>
                    `;
                    container.appendChild(div);
                });

                // Show final test button if all steps completed
                const allCompleted = this.completedSteps.every(s => s);
                document.getElementById('finalTestContainer').classList.toggle('hidden', !allCompleted);

                // Update progress
                const completedCount = this.completedSteps.filter(s => s).length;
                const progress = (completedCount / 6) * 100;
                document.getElementById('progressLine').style.height = `${progress}%`;
                document.getElementById('progressBar').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${completedCount}/6 шагов`;
                
                if (this.testResults) {
                    document.getElementById('totalScore').textContent = `${this.testResults.percentage}%`;
                }
            }

            getNextStep() {
                const index = this.completedSteps.findIndex(s => !s);
                return index === -1 ? 5 : index;
            }

            openStep(index) {
                // Allow opening completed steps or next available step
                if (!this.completedSteps[index] && index !== this.getNextStep()) {
                    return; // Can't skip ahead
                }

                this.currentStep = index;
                const step = trainingData[index];
                
                document.getElementById('roadmapView').classList.add('hidden');
                document.getElementById('learningView').classList.remove('hidden');
                document.getElementById('bottomNav').classList.add('hidden');
                
                const content = document.getElementById('stepContent');
                content.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-xl ${step.color} flex items-center justify-center text-red-600">
                            <i class="fa ${step.icon}"></i>
                        </div>
                        <div>
                            <div class="text-[10px] font-black text-slate-400 uppercase">Шаг ${step.id}</div>
                            <h2 class="text-lg font-black text-slate-800">${step.title}</h2>
                        </div>
                    </div>

                    <div class="bg-red-50 p-3 rounded-xl mb-4 border border-red-100">
                        <div class="text-[10px] font-black text-red-600 uppercase mb-1">Время выполнения</div>
                        <div class="text-sm font-bold text-slate-700">${step.content.timing}</div>
                    </div>

                    <div class="space-y-3 mb-4">
                        <h4 class="font-black text-xs uppercase text-slate-400">Ключевые моменты:</h4>
                        ${step.content.keyPoints.map(point => `
                            <div class="flex gap-3 items-start">
                                <i class="fa fa-check-circle text-red-500 mt-0.5 text-sm"></i>
                                <p class="text-sm font-semibold text-slate-700 leading-snug">${point}</p>
                            </div>
                        `).join('')}
                    </div>

                    ${step.content.phrases ? `
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 mb-4">
                            <h4 class="font-black text-[10px] uppercase text-slate-400 mb-2">Фразы для использования:</h4>
                            <div class="space-y-2">
                                ${step.content.phrases.map(phrase => `
                                    <div class="text-sm font-bold text-slate-600 italic border-l-2 border-red-300 pl-3">${phrase}</div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${step.content.technique ? `
                        <div class="bg-blue-50 p-3 rounded-xl border border-blue-100 mb-4">
                            <div class="text-[10px] font-black text-blue-600 uppercase mb-1">Техника</div>
                            <div class="text-sm font-bold text-slate-700">${step.content.technique}</div>
                        </div>
                    ` : ''}

                    ${step.content.important ? `
                        <div class="bg-red-50 p-3 rounded-xl border border-red-100 mb-4">
                            <div class="text-[10px] font-black text-red-600 uppercase mb-1">Важно</div>
                            <div class="text-sm font-bold text-slate-700">${step.content.important}</div>
                        </div>
                    ` : ''}

                    <button onclick="app.completeStep()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-black uppercase text-sm tracking-wider active:scale-95 transition-all shadow-lg shadow-red-200 mt-4">
                        ${this.completedSteps[index] ? 'Вернуться к дорожке' : 'Я изучил материал'}
                    </button>
                `;
            }

            completeStep() {
                this.completedSteps[this.currentStep] = true;
                this.backToRoadmap();
            }

            backToRoadmap() {
                document.getElementById('learningView').classList.add('hidden');
                document.getElementById('testView').classList.add('hidden');
                document.getElementById('roadmapView').classList.remove('hidden');
                document.getElementById('bottomNav').classList.remove('hidden');
                this.renderRoadmap();
            }

            startFinalTest() {
                // Shuffle all questions
                this.shuffledQuestions = [...allQuestions].sort(() => Math.random() - 0.5);
                this.currentQuestion = 0;
                this.correctAnswers = 0;
                
                document.getElementById('roadmapView').classList.add('hidden');
                document.getElementById('testView').classList.remove('hidden');
                document.getElementById('bottomNav').classList.add('hidden');
                
                this.renderTestQuestion();
            }

            renderTestQuestion() {
                const question = this.shuffledQuestions[this.currentQuestion];
                const container = document.getElementById('testContent');
                
                container.innerHTML = `
                    <div class="ios-card p-4 slide-up">
                        <div class="flex items-center justify-between mb-3">
                            <span class="text-[10px] font-black text-slate-400 uppercase">Вопрос ${this.currentQuestion + 1} из ${this.shuffledQuestions.length}</span>
                            <div class="flex gap-1">
                                ${this.shuffledQuestions.map((_, i) => `
                                    <div class="w-2 h-2 rounded-full ${i === this.currentQuestion ? 'bg-red-600' : i < this.currentQuestion ? 'bg-green-500' : 'bg-slate-200'}"></div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <h4 class="font-black text-slate-800 mb-4 leading-snug">${question.question}</h4>
                        
                        <div class="space-y-2">
                            ${question.options.map((option, i) => `
                                <button onclick="app.selectTestAnswer(${i})" class="quiz-option w-full p-3 rounded-xl bg-slate-50 text-left text-sm font-bold text-slate-700 flex items-center gap-3" data-index="${i}">
                                    <div class="w-6 h-6 rounded-full border-2 border-slate-300 flex items-center justify-center text-[10px] font-black text-slate-400">${String.fromCharCode(65 + i)}</div>
                                    ${option}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            selectTestAnswer(index) {
                const question = this.shuffledQuestions[this.currentQuestion];
                const buttons = document.querySelectorAll('.quiz-option');
                
                buttons.forEach((btn, i) => {
                    btn.disabled = true;
                    if (i === question.correct) {
                        btn.classList.add('correct');
                        btn.querySelector('div').innerHTML = '<i class="fa fa-check text-white"></i>';
                        btn.querySelector('div').classList.add('bg-green-500', 'border-green-500');
                    } else if (i === index && i !== question.correct) {
                        btn.classList.add('wrong');
                        btn.querySelector('div').innerHTML = '<i class="fa fa-times text-white"></i>';
                        btn.querySelector('div').classList.add('bg-red-500', 'border-red-500');
                    }
                });

                if (index === question.correct) {
                    this.correctAnswers++;
                }

                setTimeout(() => {
                    this.currentQuestion++;
                    if (this.currentQuestion < this.shuffledQuestions.length) {
                        this.renderTestQuestion();
                    } else {
                        this.finishTest();
                    }
                }, 1000);
            }

            finishTest() {
                const total = this.shuffledQuestions.length;
                const percentage = Math.round((this.correctAnswers / total) * 100);
                
                this.testResults = {
                    correct: this.correctAnswers,
                    total: total,
                    percentage: percentage
                };

                document.getElementById('testView').classList.add('hidden');
                document.getElementById('resultsView').classList.remove('hidden');
                
                document.getElementById('finalScore').textContent = percentage;
                document.getElementById('scoreCircle').style.setProperty('--score', percentage);
                
                let title = '';
                let message = '';
                
                if (percentage >= 90) {
                    title = 'Эксперт сервиса! 🏆';
                    message = 'Ты отлично знаешь стандарты. Готов работать в зале!';
                } else if (percentage >= 70) {
                    title = 'Отличный результат! ⭐';
                    message = 'Ты хорошо усвоил материал, но есть небольшие пробелы.';
                } else if (percentage >= 50) {
                    title = 'Хороший старт! 👍';
                    message = 'Базовые знания есть, но стоит повторить некоторые моменты.';
                } else {
                    title = 'Требуется практика 📚';
                    message = 'Рекомендуем пройти обучение еще раз для закрепления.';
                }
                
                document.getElementById('resultTitle').textContent = title;
                document.getElementById('resultMessage').textContent = message;
                
                document.getElementById('testStats').innerHTML = `
                    <div class="flex justify-between p-2 bg-slate-50 rounded-lg">
                        <span class="text-slate-600">Правильных ответов:</span>
                        <span class="font-black text-slate-800">${this.correctAnswers} из ${total}</span>
                    </div>
                    <div class="flex justify-between p-2 bg-slate-50 rounded-lg">
                        <span class="text-slate-600">Процент:</span>
                        <span class="font-black ${percentage >= 70 ? 'text-green-600' : 'text-red-600'}">${percentage}%</span>
                    </div>
                `;

                this.createConfetti();
            }

            createConfetti() {
                for (let i = 0; i < 30; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = ['#ef4444', '#dc2626', '#b91c1c', '#f87171'][Math.floor(Math.random() * 4)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }
            }

            restartTest() {
                this.startFinalTest();
                document.getElementById('resultsView').classList.add('hidden');
            }

            restartAll() {
                if (confirm('Начать всё сначала? Прогресс будет сброшен.')) {
                    this.completedSteps = new Array(6).fill(false);
                    this.testResults = null;
                    this.currentStep = 0;
                    document.getElementById('resultsView').classList.add('hidden');
                    document.getElementById('splashScreen').classList.remove('hidden');
                    document.getElementById('splashScreen').style.opacity = '1';
                    this.renderRoadmap();
                }
            }

            showRoadmap() {
                this.backToRoadmap();
                this.updateNav('roadmap');
            }

            showResults() {
                if (!this.testResults) {
                    alert('Сначала пройди финальный тест!');
                    return;
                }
                document.getElementById('roadmapView').classList.add('hidden');
                document.getElementById('learningView').classList.add('hidden');
                document.getElementById('testView').classList.add('hidden');
                document.getElementById('resultsView').classList.remove('hidden');
                this.updateNav('results');
            }

            updateNav(active) {
                const roadmapBtn = document.getElementById('navRoadmap');
                const resultsBtn = document.getElementById('navResults');
                
                if (active === 'roadmap') {
                    roadmapBtn.className = 'flex flex-col items-center gap-1 transition-all active:scale-90 text-red-600';
                    roadmapBtn.querySelector('div').className = 'w-12 h-8 rounded-2xl bg-red-100 flex items-center justify-center';
                    resultsBtn.className = 'flex flex-col items-center gap-1 transition-all active:scale-90 text-slate-400';
                    resultsBtn.querySelector('div').className = 'w-12 h-8 rounded-2xl bg-slate-100 flex items-center justify-center';
                } else {
                    resultsBtn.className = 'flex flex-col items-center gap-1 transition-all active:scale-90 text-red-600';
                    resultsBtn.querySelector('div').className = 'w-12 h-8 rounded-2xl bg-red-100 flex items-center justify-center';
                    roadmapBtn.className = 'flex flex-col items-center gap-1 transition-all active:scale-90 text-slate-400';
                    roadmapBtn.querySelector('div').className = 'w-12 h-8 rounded-2xl bg-slate-100 flex items-center justify-center';
                }
            }

            updateProgress() {
                const completedCount = this.completedSteps.filter(s => s).length;
                document.getElementById('progressText').textContent = `${completedCount}/6 шагов`;
            }
        }

        const app = new TrainingApp();
    </script>
</body>
</html>
